<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Трдельник — Меню</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --yellow: #FFE300;
    --yellow-dark: #C8B400;
    --bg: #ffffff;
    --surface: #f2f2f2;
    --text: #1a1a1a;
    --text-muted: #999;
    --red: #DA291C;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 130px;
    overflow-x: hidden;
  }

  .header {
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-size: 22px;
    font-weight: 900;
    color: var(--yellow-dark);
    letter-spacing: -0.5px;
  }

  .greeting {
    padding: 14px 20px 20px;
  }

  .greeting h1 {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }

  .greeting h1 span { font-weight: 400; }

  /* Category grid — 2×2, all clickable */
  .categories {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 20px 28px;
  }

  .cat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 14px 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    min-height: 108px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    border: 2.5px solid transparent;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
  }

  .cat-card:active { transform: scale(0.96); }

  /* Active state — yellow highlight */
  .cat-card.active {
    background: var(--yellow);
    border-color: var(--yellow-dark);
  }

  .cat-card.active .cat-name { color: #1a1a1a; }
  .cat-card.active .cat-count { background: rgba(0,0,0,0.12); color: #1a1a1a; }

  /* Red featured — only when NOT active */
  .cat-card.red-default:not(.active) {
    background: var(--red);
  }
  .cat-card.red-default:not(.active) .cat-name { color: white; }
  .cat-card.red-default:not(.active) .cat-count { background: rgba(255,255,255,0.25); color: white; }

  .cat-icon {
    font-size: 40px;
    position: absolute;
    top: 8px;
    right: 10px;
  }

  .cat-name {
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.25;
  }

  .cat-count {
    display: inline-block;
    margin-top: 5px;
    background: rgba(0,0,0,0.07);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 8px;
    width: fit-content;
  }

  /* Section title */
  .section-header {
    padding: 0 20px 14px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .section-title {
    font-size: 24px;
    font-weight: 900;
    color: var(--text);
  }

  .section-count {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* Product list */
  .products {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 20px;
  }

  .product-card {
    background: var(--bg);
    border-radius: var(--radius);
    border: 1.5px solid #e8e8e8;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    transition: opacity 0.2s;
  }

  .product-img {
    width: 70px;
    height: 70px;
    border-radius: 12px;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
  }

  .product-info { flex: 1; min-width: 0; }

  .product-new {
    font-size: 10px;
    font-weight: 800;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 2px;
  }

  .product-name {
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 3px;
    color: var(--text);
    line-height: 1.2;
  }

  .product-desc {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .product-price {
    font-size: 15px;
    font-weight: 900;
    color: var(--text);
    margin-top: 5px;
  }

  /* Qty controls */
  .qty-control {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-radius: 20px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .qty-btn {
    width: 30px;
    height: 30px;
    border: none;
    background: transparent;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }

  .qty-btn.plus {
    background: var(--yellow);
    border-radius: 50%;
  }

  .qty-btn:active { opacity: 0.6; }

  .qty-num {
    font-size: 13px;
    font-weight: 800;
    min-width: 18px;
    text-align: center;
    color: var(--text);
  }

  .add-btn {
    width: 30px;
    height: 30px;
    background: var(--yellow);
    border: none;
    border-radius: 50%;
    font-size: 19px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    flex-shrink: 0;
  }

  .add-btn:active { transform: scale(0.88); }

  /* Fade animation for list */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .products .product-card {
    animation: fadeIn 0.18s ease both;
  }

  /* Bottom cart bar */
  .cart-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 10px 20px 28px;
    background: var(--bg);
    border-top: 1px solid #ebebeb;
    display: none;
    z-index: 100;
  }

  .cart-bar.visible { display: block; }

  .cart-btn {
    width: 100%;
    background: var(--yellow);
    border: none;
    border-radius: 14px;
    padding: 15px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }

  .cart-btn:active { opacity: 0.85; }

  .cart-btn-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cart-badge {
    background: var(--text);
    color: var(--yellow);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cart-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .cart-total {
    font-size: 15px;
    font-weight: 900;
    color: var(--text);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    border-radius: 22px 22px 0 0;
    width: 100%;
    max-height: 78vh;
    overflow-y: auto;
    padding: 16px 20px 40px;
  }

  .modal-handle {
    width: 34px;
    height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 3px;
  }

  .modal-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 18px;
  }

  .order-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .order-item-icon {
    font-size: 26px;
    width: 42px;
    height: 42px;
    background: var(--surface);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .order-item-name { flex: 1; font-size: 13px; font-weight: 600; }
  .order-item-price { font-size: 13px; font-weight: 700; }

  .order-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0 18px;
  }

  .order-total-label { font-size: 15px; color: var(--text-muted); }
  .order-total-amount { font-size: 26px; font-weight: 900; }

  .order-btn {
    width: 100%;
    background: var(--yellow);
    border: none;
    border-radius: 14px;
    padding: 17px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    color: var(--text);
  }

  /* Product detail bottom sheet */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    align-items: flex-end;
  }

  .detail-overlay.open { display: flex; }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .detail-sheet {
    background: var(--bg);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1) both;
  }

  .detail-hero {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    font-size: 96px;
    position: relative;
  }

  .detail-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.12);
    border: none;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    font-weight: 700;
  }

  .detail-body {
    padding: 20px 20px 36px;
  }

  .detail-new {
    font-size: 11px;
    font-weight: 800;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
  }

  .detail-name {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 6px;
  }

  .detail-price {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 18px;
  }

  .detail-section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .ingredient-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .ingredient-pill {
    background: var(--surface);
    border-radius: 20px;
    padding: 6px 13px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .detail-add-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .detail-add-btn {
    flex: 1;
    background: var(--yellow);
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .detail-add-btn:active { opacity: 0.8; }

  .detail-qty-control {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-radius: 14px;
    overflow: hidden;
    flex: 1;
    justify-content: space-between;
  }

  .detail-qty-btn {
    width: 50px;
    height: 52px;
    border: none;
    background: transparent;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }

  .detail-qty-btn.dplus { background: var(--yellow); }
  .detail-qty-btn:active { opacity: 0.6; }

  .detail-qty-num {
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Трдельник</div>
  <div style="font-size: 22px;">🇷🇺</div>
</div>

<div class="greeting">
  <h1>Привет,<br><span>что закажем?</span></h1>
</div>

<!-- 4 category cards — act as filters -->
<div class="categories">
  <div class="cat-card red-default active" id="cat-sweet" onclick="selectCategory('sweet')">
    <div class="cat-icon">🍬</div>
    <div class="cat-name">Сладкие трдельники</div>
    <span class="cat-count">4 позиции</span>
  </div>
  <div class="cat-card" id="cat-savory" onclick="selectCategory('savory')">
    <div class="cat-icon">🥩</div>
    <div class="cat-name">Сытные трдельники</div>
    <span class="cat-count">6 позиций</span>
  </div>
  <div class="cat-card" id="cat-icecream" onclick="selectCategory('icecream')">
    <div class="cat-icon">🍦</div>
    <div class="cat-name">С мороженым</div>
    <span class="cat-count">3 позиции</span>
  </div>
  <div class="cat-card" id="cat-new" onclick="selectCategory('new')">
    <div class="cat-icon">🆕</div>
    <div class="cat-name">Новинки</div>
    <span class="cat-count">2 позиции</span>
  </div>
</div>

<!-- Filtered product list -->
<div class="section-header">
  <div class="section-title" id="section-title">Сладкие</div>
  <div class="section-count" id="section-count"></div>
</div>
<div class="products" id="product-list"></div>

<!-- Cart bar -->
<div class="cart-bar" id="cart-bar">
  <button class="cart-btn" onclick="openModal()">
    <div class="cart-btn-left">
      <div class="cart-badge" id="cart-count">0</div>
      <span class="cart-label">Мой заказ</span>
    </div>
    <span class="cart-total" id="cart-total-btn">0 ₽</span>
  </button>
</div>

<!-- Product detail sheet -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detail-sheet">
    <div class="detail-hero" id="detail-hero">
      <button class="detail-close" onclick="closeDetailBtn()">✕</button>
      <span id="detail-emoji"></span>
    </div>
    <div class="detail-body">
      <div class="detail-new" id="detail-new" style="display:none;">Новинка!</div>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-price" id="detail-price"></div>
      <div class="detail-section-label">Состав</div>
      <div class="ingredient-list" id="detail-ingredients"></div>
      <div class="detail-add-row" id="detail-add-row"></div>
    </div>
  </div>
</div>

<!-- Order modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Мой заказ</div>
    <div class="modal-subtitle">С собой</div>
    <div id="modal-items"></div>
    <div class="order-total-row">
      <span class="order-total-label">Итого</span>
      <span class="order-total-amount" id="modal-total">0 ₽</span>
    </div>
    <button class="order-btn" onclick="placeOrder()">Оформить заказ</button>
  </div>
</div>

<script>
const allItems = [
  { id: 's1', name: 'Яблочный пай',       desc: 'Трдельник с корицей, крем-сыр, яблоки, яблочный джем, мороженое, карамель',
    ingredients: ['Трдельник с корицей','Крем-сыр','Яблоки','Яблочный джем','Мороженое','Карамель'],
    price: 400, emoji: '🍎', tags: ['sweet','icecream'] },
  { id: 's2', name: 'Белогривая лошадка', desc: 'Трдельник с кокосом, нутелла, фрукты (киви, банан), взбитые сливки, зефирки, ягодный топпинг',
    ingredients: ['Трдельник с кокосом','Нутелла','Киви','Банан','Взбитые сливки','Зефирки','Ягодный топпинг'],
    price: 400, emoji: '🥝', tags: ['sweet'] },
  { id: 's3', name: 'Сладкая мечта',      desc: 'Трдельник с корицей, нутелла, фрукты (киви, банан), орешки, мороженое, карамель',
    ingredients: ['Трдельник с корицей','Нутелла','Киви','Банан','Орешки','Мороженое','Карамель'],
    price: 400, emoji: '🍫', tags: ['sweet','icecream'] },
  { id: 's4', name: 'Беби Бум',           desc: 'Трдельник с цветной посыпкой, нутелла, фрукты (киви, банан), мороженое, украшения',
    ingredients: ['Трдельник с цветной посыпкой','Нутелла','Киви','Банан','Мороженое','Украшения'],
    price: 400, emoji: '🌈', tags: ['sweet','icecream','new'], isNew: true },
  { id: 'v1', name: 'Буффонище',          desc: 'Классический трдельник, адыгейский сыр, томаты Черри, прованские травы + лист салата',
    ingredients: ['Классический трдельник','Адыгейский сыр','Томаты Черри','Прованские травы','Лист салата'],
    price: 450, emoji: '🧀', tags: ['savory'] },
  { id: 'v2', name: 'Мастер и маргарита', desc: 'Классический трдельник, салями, томатный соус, томаты Черри, салат Айсберг, маслины, корнишоны, жареный лук',
    ingredients: ['Классический трдельник','Салями','Томатный соус','Томаты Черри','Салат Айсберг','Маслины','Корнишоны','Жареный лук'],
    price: 450, emoji: '🍕', tags: ['savory'] },
  { id: 'v3', name: 'Рыба моей мечты',    desc: 'Классический трдельник, слабосоленая рыба, свежий огурец и творожный сыр + лист салата',
    ingredients: ['Классический трдельник','Слабосоленая рыба','Свежий огурец','Творожный сыр','Лист салата'],
    price: 470, emoji: '🐟', tags: ['savory'] },
  { id: 'v4', name: 'Война и мир',        desc: 'Классический трдельник, ветчина, сыр «Гауда», творожный сыр + лист салата',
    ingredients: ['Классический трдельник','Ветчина','Сыр «Гауда»','Творожный сыр','Лист салата'],
    price: 450, emoji: '🥗', tags: ['savory'] },
  { id: 'v5', name: 'Баварский шпион',    desc: 'Классический трдельник, колбаски на гриле, салат Айсберг, соус «1000 островов», ломтик «Чеддера», корнишон',
    ingredients: ['Классический трдельник','Колбаски на гриле','Салат Айсберг','Соус «1000 островов»','Ломтик «Чеддера»','Корнишон'],
    price: 450, emoji: '🌭', tags: ['savory'] },
  { id: 'v6', name: 'Цезарь',             desc: 'Копченая курица, томаты Черри, листовой салат, соус «Цезарь», тёртый пармезан',
    ingredients: ['Классический трдельник','Копченая курица','Томаты Черри','Листовой салат','Соус «Цезарь»','Тёртый пармезан'],
    price: 470, emoji: '🍗', tags: ['savory','new'], isNew: true },
];

const categoryMeta = {
  sweet:   { label: 'Сладкие' },
  savory:  { label: 'Сытные' },
  icecream:{ label: 'С мороженым' },
  new:     { label: 'Новинки' },
};

let activeCategory = 'sweet';
const cart = {};

function selectCategory(cat) {
  activeCategory = cat;

  document.querySelectorAll('.cat-card').forEach(el => el.classList.remove('active'));
  document.getElementById('cat-' + cat).classList.add('active');

  const filtered = allItems.filter(i => i.tags.includes(cat));
  document.getElementById('section-title').textContent = categoryMeta[cat].label;
  document.getElementById('section-count').textContent = filtered.length + ' ' + plural(filtered.length);

  renderProducts(filtered);

  document.getElementById('product-list').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function plural(n) {
  if (n === 1) return 'позиция';
  if (n >= 2 && n <= 4) return 'позиции';
  return 'позиций';
}

function renderProducts(items) {
  const container = document.getElementById('product-list');
  container.innerHTML = items.map((item, idx) => `
    <div class="product-card" style="animation-delay:${idx * 0.04}s; cursor:pointer;" onclick="openDetail('${item.id}')">
      <div class="product-img">${item.emoji}</div>
      <div class="product-info">
        ${item.isNew ? '<div class="product-new">Новинка!</div>' : ''}
        <div class="product-name">${item.name}</div>
        <div class="product-desc">${item.desc}</div>
        <div class="product-price">${item.price} ₽</div>
      </div>
      <button class="add-btn" id="add-${item.id}" onclick="event.stopPropagation(); setQty('${item.id}', 1)"
        style="display:${getQty(item.id) === 0 ? 'flex' : 'none'}">+</button>
      <div class="qty-control" id="ctrl-${item.id}"
        style="display:${getQty(item.id) > 0 ? 'flex' : 'none'}" onclick="event.stopPropagation()">
        <button class="qty-btn minus" onclick="setQty('${item.id}', -1)">−</button>
        <span class="qty-num" id="qty-${item.id}">${getQty(item.id)}</span>
        <button class="qty-btn plus" onclick="setQty('${item.id}', 1)">+</button>
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  const item = getItemById(id);
  if (!item) return;
  document.getElementById('detail-emoji').textContent = item.emoji;
  document.getElementById('detail-name').textContent  = item.name;
  document.getElementById('detail-price').textContent = item.price + ' ₽';
  const newEl = document.getElementById('detail-new');
  newEl.style.display = item.isNew ? 'block' : 'none';
  document.getElementById('detail-ingredients').innerHTML =
    item.ingredients.map(i => `<span class="ingredient-pill">${i}</span>`).join('');
  renderDetailBtn(id);
  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('detail-overlay')._currentId = id;
}

function renderDetailBtn(id) {
  const qty = getQty(id);
  const row = document.getElementById('detail-add-row');
  if (qty === 0) {
    row.innerHTML = `<button class="detail-add-btn" onclick="detailSetQty('${id}', 1)">
      <span style="font-size:18px;">+</span> Добавить в заказ
    </button>`;
  } else {
    row.innerHTML = `<div class="detail-qty-control">
      <button class="detail-qty-btn" onclick="detailSetQty('${id}', -1)">−</button>
      <span class="detail-qty-num" id="dqty-${id}">${qty}</span>
      <button class="detail-qty-btn dplus" onclick="detailSetQty('${id}', 1)">+</button>
    </div>`;
  }
}

function detailSetQty(id, delta) {
  setQty(id, delta);
  renderDetailBtn(id);
  const listQtyEl = document.getElementById('qty-' + id);
  if (listQtyEl) listQtyEl.textContent = getQty(id);
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetailBtn();
}

function closeDetailBtn() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function getQty(id) { return cart[id] || 0; }

function setQty(id, delta) {
  const next = Math.max(0, getQty(id) + delta);
  if (next === 0) delete cart[id]; else cart[id] = next;
  const addEl  = document.getElementById('add-' + id);
  const ctrlEl = document.getElementById('ctrl-' + id);
  const qtyEl  = document.getElementById('qty-' + id);
  if (!addEl) return;
  qtyEl.textContent = next;
  addEl.style.display  = next === 0 ? 'flex' : 'none';
  ctrlEl.style.display = next > 0  ? 'flex' : 'none';
  updateCart();
}

function updateCart() {
  const ids   = Object.keys(cart);
  const total = ids.reduce((s, id) => s + cart[id] * getPriceById(id), 0);
  const count = ids.reduce((s, id) => s + cart[id], 0);
  document.getElementById('cart-count').textContent    = count;
  document.getElementById('cart-total-btn').textContent = total.toLocaleString('ru') + ' ₽';
  document.getElementById('cart-bar').className = count > 0 ? 'cart-bar visible' : 'cart-bar';
  if (window.Telegram && window.Telegram.WebApp) {
    if (count > 0) {
      Telegram.WebApp.MainButton.setText('Заказать — ' + total.toLocaleString('ru') + ' ₽');
      Telegram.WebApp.MainButton.show();
    } else { Telegram.WebApp.MainButton.hide(); }
  }
}

function getPriceById(id) { return (allItems.find(i => i.id === id) || {}).price || 0; }
function getItemById(id)  { return allItems.find(i => i.id === id); }

function openModal() {
  const ids = Object.keys(cart);
  if (!ids.length) return;
  const total = ids.reduce((s, id) => s + cart[id] * getPriceById(id), 0);
  document.getElementById('modal-items').innerHTML = ids.map(id => {
    const item = getItemById(id);
    return `<div class="order-item">
      <div class="order-item-icon">${item.emoji}</div>
      <div class="order-item-name">${item.name} × ${cart[id]}</div>
      <div class="order-item-price">${(item.price * cart[id]).toLocaleString('ru')} ₽</div>
    </div>`;
  }).join('');
  document.getElementById('modal-total').textContent = total.toLocaleString('ru') + ' ₽';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

function placeOrder() {
  const ids = Object.keys(cart);
  const total = ids.reduce((s, id) => s + cart[id] * getPriceById(id), 0);
  const data = { items: ids.map(id => ({ id, qty: cart[id], price: getPriceById(id) })), total };
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.sendData(JSON.stringify(data));
  } else {
    alert('Заказ оформлен!\nИтого: ' + total.toLocaleString('ru') + ' ₽');
  }
}

selectCategory('sweet');

if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.MainButton.setParams({ color: '#FFE300', text_color: '#1a1a1a' });
  Telegram.WebApp.MainButton.onClick(openModal);
}
</script>
</body>
</html>
