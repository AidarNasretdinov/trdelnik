<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Трдельник — Админ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const BACKEND_URL = 'https://lucky-insight-production-ca3a.up.railway.app';
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--y:#FFE300;--yd:#C8B400;--bg:#f2f2f2;--card:#fff;--tx:#1a1a1a;--mu:#888;--red:#DA291C;--green:#27AE60;--r:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:32px}

/* Header */
.hdr{background:#1a1a1a;padding:16px 20px;display:flex;align-items:center;gap:12px}
.hdr-title{font-size:18px;font-weight:900;color:var(--y)}
.hdr-sub{font-size:12px;color:#888;margin-top:2px}

/* Cards */
.card{background:var(--card);border-radius:var(--r);margin:12px 16px 0;padding:16px 18px}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle-label{font-size:16px;font-weight:700}
.toggle-sub{font-size:12px;color:var(--mu);margin-top:3px}
.switch{position:relative;width:52px;height:30px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#ccc;border-radius:30px;cursor:pointer;transition:.3s}
.slider:before{content:'';position:absolute;width:24px;height:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--green)}
input:checked+.slider:before{transform:translateX(22px)}

/* Date nav */
.date-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.date-nav button{background:var(--bg);border:none;border-radius:10px;width:40px;height:40px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx)}
.date-nav button:active{opacity:.6}
.date-display{flex:1;text-align:center}
.date-display .dval{font-size:16px;font-weight:800}
.date-display .dsub{font-size:11px;color:var(--mu);margin-top:2px}
input[type=date]{position:absolute;opacity:0;width:0;height:0}

/* Stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.stat{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:900}
.stat-label{font-size:10px;color:var(--mu);margin-top:3px;font-weight:600;text-transform:uppercase}

/* Order list */
.section-title{font-size:13px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.refresh-hint{font-size:11px;font-weight:400;text-transform:none;letter-spacing:0}

.order-card{background:var(--card);border-radius:var(--r);margin:8px 16px 0;overflow:hidden}
.order-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.order-id{font-size:15px;font-weight:800}
.order-meta{font-size:12px;color:var(--mu);margin-top:2px}
.order-right{text-align:right}
.order-total{font-size:15px;font-weight:800}
.status-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:4px}
.s-new{background:#EBF5FB;color:#2980B9}
.s-accepted{background:#EAFAF1;color:#27AE60}
.s-tenmin{background:#FEF9E7;color:#F39C12}
.s-ready{background:#EAFAF1;color:#1E8449}
.s-rejected{background:#FDEDEC;color:#C0392B}

.order-body{display:none;padding:0 14px 12px;border-top:1px solid #f0f0f0}
.order-body.open{display:block}
.order-info{font-size:12px;color:var(--mu);margin-bottom:8px;padding-top:10px}
.order-item{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.order-item-name{color:var(--tx)}
.order-item-price{font-weight:700;white-space:nowrap}
.order-custom{font-size:11px;color:var(--mu);padding:2px 0 4px 8px}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--mu)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:600}

/* Loading */
.loading{text-align:center;padding:32px;color:var(--mu);font-size:14px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">⚙️ Панель управления</div>
    <div class="hdr-sub">Трдельник — только для администратора</div>
  </div>
</div>

<!-- Приём заказов -->
<div class="card">
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Приём заказов</div>
      <div class="toggle-sub" id="toggle-sub">Загрузка...</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="orders-toggle" onchange="toggleOrders()">
      <span class="slider"></span>
    </label>
  </div>
</div>

<!-- Дата и статистика -->
<div class="card">
  <div class="date-nav">
    <button onclick="changeDate(-1)">‹</button>
    <div class="date-display">
      <div class="dval" id="date-display">—</div>
      <div class="dsub" id="date-sub">—</div>
    </div>
    <button onclick="changeDate(1)">›</button>
  </div>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-label">Заказов</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-active">—</div>
      <div class="stat-label">Активных</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-revenue">—</div>
      <div class="stat-label">Выручка ₽</div>
    </div>
  </div>
</div>

<!-- Список заказов -->
<div class="section-title">
  Заказы
  <span class="refresh-hint" id="refresh-hint"></span>
</div>
<div id="orders-list"><div class="loading">Загрузка...</div></div>

<script>
const twa = window.Telegram?.WebApp;
if(twa) twa.ready();

const BACKEND = BACKEND_URL;
const initData = twa?.initData || '';

// ── XSS-защита ────────────────────────────────────────────────────────────────
function esc(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ── Дата ──────────────────────────────────────────────────────────────────────
// Берём дату с устройства — телефон должен быть в правильной таймзоне (МСК).
function localDateStr(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

let currentDate = new Date();

function toDateStr(d){ return localDateStr(d); }

function formatDateDisplay(d){
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const opts = {day:'numeric', month:'long'};
  const label = toDateStr(d)===toDateStr(today) ? 'Сегодня' :
                toDateStr(d)===toDateStr(yesterday) ? 'Вчера' : '';
  return {main: d.toLocaleDateString('ru-RU', opts), sub: label};
}

function changeDate(delta){
  currentDate = new Date(currentDate.getTime() + delta * 24 * 60 * 60 * 1000);
  // Нельзя листать в будущее
  const today = new Date();
  if(toDateStr(currentDate) > toDateStr(today)) { currentDate = new Date(currentDate.getTime() - delta * 24 * 60 * 60 * 1000); return; }
  renderDate();
  loadOrders();
}

function renderDate(){
  const {main, sub} = formatDateDisplay(currentDate);
  document.getElementById('date-display').textContent = main;
  document.getElementById('date-sub').textContent = sub;
}

// ── API ───────────────────────────────────────────────────────────────────────
function apiHeaders(){
  return {'Content-Type':'application/json','X-Init-Data': initData};
}

async function loadStatus(){
  try{
    const r = await fetch(BACKEND+'/admin/status', {headers: apiHeaders()});
    const d = await r.json();
    if(d.ok !== undefined){
      const toggle = document.getElementById('orders-toggle');
      toggle.checked = d.orders_open;
      updateToggleSub(d.orders_open);
    }
  }catch(e){ document.getElementById('toggle-sub').textContent = 'Ошибка загрузки'; }
}

function updateToggleSub(open){
  document.getElementById('toggle-sub').textContent = open
    ? '✅ Клиенты могут делать заказы'
    : '🔴 Заказы не принимаются';
}

let toggleBusy = false;
async function toggleOrders(){
  if(toggleBusy) return;
  toggleBusy = true;
  const toggle = document.getElementById('orders-toggle');
  const open = toggle.checked;
  try{
    const r = await fetch(BACKEND+'/admin/toggle', {
      method:'POST', headers: apiHeaders(),
      body: JSON.stringify({open})
    });
    const d = await r.json();
    if(d.ok){
      updateToggleSub(d.orders_open);
    } else {
      toggle.checked = !open; // откат
    }
  }catch(e){
    toggle.checked = !open;
  }
  toggleBusy = false;
}

// ── Авто-обновление ───────────────────────────────────────────────────────────
const REFRESH_INTERVAL = 30; // секунды
let refreshTimer = null;
let secondsLeft = REFRESH_INTERVAL;

function startAutoRefresh(){
  clearInterval(refreshTimer);
  secondsLeft = REFRESH_INTERVAL;
  updateRefreshHint();
  refreshTimer = setInterval(()=>{
    secondsLeft--;
    if(secondsLeft <= 0){
      secondsLeft = REFRESH_INTERVAL;
      loadOrders(true); // тихое обновление — без спиннера
    }
    updateRefreshHint();
  }, 1000);
}

function updateRefreshHint(){
  const el = document.getElementById('refresh-hint');
  if(el) el.textContent = `обновление через ${secondsLeft} сек`;
}

async function loadOrders(silent = false){
  const dateStr = toDateStr(currentDate);
  if(!silent){
    document.getElementById('orders-list').innerHTML = '<div class="loading">Загрузка...</div>';
    document.getElementById('stat-total').textContent = '—';
    document.getElementById('stat-active').textContent = '—';
    document.getElementById('stat-revenue').textContent = '—';
  }

  try{
    const r = await fetch(BACKEND+`/admin/orders?date=${dateStr}`, {headers: apiHeaders()});
    const d = await r.json();
    if(!d.ok){ if(!silent) renderError(); return; }
    renderStats(d.orders, d.revenue);
    renderOrders(d.orders);
  }catch(e){ if(!silent) renderError(); }
}

function renderError(){
  document.getElementById('orders-list').innerHTML =
    '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Ошибка загрузки</div></div>';
}

function renderStats(orders, revenue){
  const active = orders.filter(o=>!['rejected','ready'].includes(o.status)).length;
  document.getElementById('stat-total').textContent = orders.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-revenue').textContent = revenue.toLocaleString('ru');
}

const STATUS_MAP = {
  new:      {label:'Новый',    cls:'s-new'},
  accepted: {label:'Принят',   cls:'s-accepted'},
  tenmin:   {label:'10 мин',   cls:'s-tenmin'},
  ready:    {label:'Выдан',    cls:'s-ready'},
  rejected: {label:'Отклонён', cls:'s-rejected'},
};

function renderOrders(orders){
  const el = document.getElementById('orders-list');
  if(!orders.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Заказов нет</div></div>';
    return;
  }

  // Запоминаем, какие карточки раскрыты, чтобы не схлопнуть при тихом обновлении
  const openIds = new Set(
    [...document.querySelectorAll('.order-body.open')].map(el => el.id.replace('ob-',''))
  );

  el.innerHTML = orders.map(o => {
    const st = STATUS_MAP[o.status] || {label: esc(o.status), cls:'s-new'};
    const time = o.created_at ? o.created_at.slice(11,16) : '';

    const itemsHtml = o.items.map(item => {
      const price = (item.price ?? 0) * (item.qty ?? 1);
      let extra = '';
      if(item.custom){
        const parts = [];
        if(item.base) parts.push(esc(item.base));
        if(item.fillings?.length) parts.push(item.fillings.map(esc).join(', '));
        if(item.toppings?.length) parts.push(item.toppings.map(esc).join(', '));
        if(parts.length) extra = `<div class="order-custom">${parts.join(' · ')}</div>`;
      }
      return `<div class="order-item">
        <span class="order-item-name">${esc(item.name)} ×${esc(item.qty)}</span>
        <span class="order-item-price">${price}₽</span>
      </div>${extra}`;
    }).join('');

    const isOpen = openIds.has(String(o.id));

    return `<div class="order-card">
      <div class="order-head" onclick="toggleOrder(${Number(o.id)})">
        <div>
          <div class="order-id">#${Number(o.id)} — ${esc(o.name)}</div>
          <div class="order-meta">📍 ${esc(o.location)} · 📞 ${esc(o.phone)}${time?' · '+esc(time):''}</div>
        </div>
        <div class="order-right">
          <div class="order-total">${Number(o.total)}₽</div>
          <span class="status-badge ${st.cls}">${st.label}</span>
        </div>
      </div>
      <div class="order-body${isOpen?' open':''}" id="ob-${Number(o.id)}">
        ${itemsHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleOrder(id){
  const el = document.getElementById('ob-'+id);
  el.classList.toggle('open');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderDate();
loadStatus();
loadOrders();
startAutoRefresh();
</script>
</body>
</html>
